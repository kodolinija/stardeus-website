{% assign u = 'img/screenshots/' | append: include.id %}
{% assign thumbnail_id = include.id | replace: '.png', '.jpg' %}
{% assign thumbnail_u = 'img/screenshots/thumbnails/' | append: thumbnail_id %}
<a class="screenshot-link" href="{{ u | relative_url }}" data-screenshot-lightbox>
    <img src="{{ thumbnail_u | relative_url }}" alt="{{ include.name }}" loading="lazy" decoding="async">
</a>
