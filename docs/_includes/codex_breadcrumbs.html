{% if page.section %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Stardeus Codex",
      "item": "{{ '/codex/' | absolute_url }}"
    }{% if page.group %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.group | jsonify }},
      "item": "{{ page.group_url | default: '/codex/' | absolute_url }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.h1 | default: page.title | jsonify }},
      "item": "{{ page.url | absolute_url }}"
    }{% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.h1 | default: page.title | jsonify }},
      "item": "{{ page.url | absolute_url }}"
    }{% endif %}
  ]
}
</script>
{% endif %}
